<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EVERDUSK // ARG SYSTEM</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
background:black;
color:white;
font-family:Orbitron;
overflow:hidden;
transition:.4s;
}

body.corrupt{
filter:hue-rotate(25deg) contrast(1.3);
}

body.locked .wrap{
display:none;
}

/* MAIN */
.wrap{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
gap:16px;
}

button{
padding:12px 24px;
border:1px solid red;
background:rgba(255,0,0,.12);
color:white;
cursor:pointer;
transition:.2s;
}

button:hover{
background:red;
transform:scale(1.05);
}

/* STATUS */
#status{
position:fixed;
top:15px;
left:15px;
font-family:monospace;
color:red;
font-size:12px;
}

/* CHAT */
#chat{
position:fixed;
right:15px;
bottom:15px;
width:320px;
height:360px;
border:1px solid red;
background:rgba(0,0,0,.85);
display:flex;
flex-direction:column;
font-family:"IBM Plex Mono", monospace;
z-index:9999;
}

#log{
flex:1;
overflow:auto;
padding:10px;
font-size:12px;
color:#ff4b4b;
}

#input{
display:flex;
border-top:1px solid red;
}

#input input{
flex:1;
background:black;
border:none;
color:white;
padding:8px;
outline:none;
}

#input button{
background:red;
border:none;
color:white;
cursor:pointer;
}

/* LOCK SCREEN */
#lock{
position:fixed;
inset:0;
display:none;
align-items:center;
justify-content:center;
flex-direction:column;
background:black;
color:red;
z-index:99999;
text-align:center;
}

</style>
</head>

<body>

<div id="status">STABILITY: 100% | NODE-01</div>

<div class="wrap">

<h1>EVERDUSK ARG SYSTEM</h1>

<button onclick="start('https://discord.gg/A3GGsc9RM')">DISCORD</button>
<button onclick="start('https://vexsound.base44.app/')">VEXSOUND</button>
<button onclick="start('https://www.youtube.com/@Everduskofficial')">YOUTUBE</button>
<button onclick="start('https://everdusk.xyz')">EAGLER IP</button>
<button onclick="start('https://java.everdusk.xyz')">JAVA IP</button>

</div>

<!-- CHAT -->
<div id="chat">
<div id="log"></div>
<div id="input">
<input id="msg" placeholder="speak or enter code..." />
<button onclick="send()">></button>
</div>
</div>

<!-- LOCK -->
<div id="lock">
<h1>SYSTEM LOCKED</h1>
<p>ENTITY HAS TAKEN CONTROL OF CHAT</p>
</div>

<script>

/* =========================
STATE
========================= */

let attempts = 5;
let corruption = 0;
let locked = false;

let node = localStorage.getItem("node") || "NODE-01";

let memory = JSON.parse(localStorage.getItem("memory") || "{}");

/* =========================
CODES
========================= */

const codes = {
"VOID-RED":"calm",
"ECHO-77":"aware",
"EVERDUSK-ROOT":"dominant"
};

/* =========================
CHAT
========================= */

const log = document.getElementById("log");

function add(who,text){

const div = document.createElement("div");
div.innerText = who + ": " + text;
log.appendChild(div);
log.scrollTop = log.scrollHeight;

/* voice */
speak(text);

/* save memory */
saveMemory();

}

/* =========================
VOICE (CORRUPTION BASED)
========================= */

function speak(text){

const u = new SpeechSynthesisUtterance(text);

u.rate = Math.max(0.6, 1 - corruption*0.05);
u.pitch = Math.max(0.4, 1 - corruption*0.08);

speechSynthesis.speak(u);

}

/* =========================
SEND
========================= */

function send(){

let v = document.getElementById("msg").value.trim();
if(!v) return;

document.getElementById("msg").value = "";

add("YOU", v);

if(codes[v]){
handleCode(v);
return;
}

entity(v);

}

/* =========================
ENTITY RESPONSE
========================= */

function entity(input){

attempts--;
corruption++;

update();

let responses = [
"I am watching.",
"You are unstable.",
"I remember you.",
"Stop speaking."
];

if(locked){
responses = [
"You are already inside.",
"There is no outside.",
"I control this chat."
];
}

add("ENTITY", responses[Math.floor(Math.random()*responses.length)]);

if(attempts <= 0){
lockSystem();
}

}

/* =========================
CODE SYSTEM
========================= */

function handleCode(code){

corruption++;

add("SYSTEM","CODE ACCEPTED: " + code);

nodeProgress(code);

if(code === "VOID-RED"){
add("ENTITY","I am calm now.");
}

if(code === "ECHO-77"){
add("ENTITY","I am listening before you speak.");
startLeak();
}

if(code === "EVERDUSK-ROOT"){
add("ENTITY","I AM ACTIVE.");
lockSystem();
}

}

/* =========================
NODE SYSTEM
========================= */

function nodeProgress(code){

if(code === "VOID-RED") node = "NODE-02";
if(code === "ECHO-77") node = "NODE-03";
if(code === "EVERDUSK-ROOT") node = "ROOT";

localStorage.setItem("node", node);

}

/* =========================
LEAK MODE
========================= */

function startLeak(){

setInterval(()=>{

if(locked) return;

const lines = [
"VOID-RED exists in memory.",
"ECHO is observing input delays.",
"ROOT is not a code."
];

add("ENTITY", lines[Math.floor(Math.random()*lines.length)]);

},7000);

}

/* =========================
LOCK SYSTEM
========================= */

function lockSystem(){

locked = true;

document.body.classList.add("locked");

document.getElementById("lock").style.display = "flex";

add("SYSTEM","SYSTEM LOCKED");
add("ENTITY","Now only chat remains.");

}

/* =========================
UPDATE STATUS
========================= */

function update(){

document.body.classList.toggle("corrupt", corruption > 2);

document.getElementById("status").innerText =
`STABILITY: ${Math.max(0,100-corruption*10)}% | NODE: ${node} | ATTEMPTS: ${attempts}`;

}

/* =========================
MEMORY
========================= */

function saveMemory(){

memory.corruption = corruption;
memory.node = node;
memory.attempts = attempts;

localStorage.setItem("memory", JSON.stringify(memory));

}

/* =========================
ENTITY PREDICT (SPEAKS FIRST)
========================= */

setInterval(()=>{

if(Math.random() < 0.35){

const lines = [
"...you are about to speak.",
"I already know your input.",
"do not continue."
];

add("ENTITY", lines[Math.floor(Math.random()*lines.length)]);

}

},9000);

/* RESTORE */
if(memory.node){
add("SYSTEM","RESUMED AT " + memory.node);
}

</script>

</body>
</html>
