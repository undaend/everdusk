<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EVERDUSK</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
background:black;
color:white;
font-family:Orbitron;
overflow:hidden;
}

/* BACKGROUND */
.bg{
position:fixed;inset:0;
background:radial-gradient(circle, rgba(255,0,0,.2), transparent 60%), #000;
}

/* BUTTONS */
.wrap{
position:relative;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
gap:20px;
z-index:2;
}

button{
padding:15px 30px;
border:1px solid red;
background:rgba(255,0,0,.1);
color:white;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.1);
background:red;
}

/* CUTSCENE */
.cutscene{
position:fixed;
inset:0;
display:none;
align-items:center;
justify-content:center;
background:black;
z-index:9999;
flex-direction:column;
}

.cutscene.active{display:flex;}

#count{
font-size:180px;
}

/* JUMPSCARE */
#scare{
position:fixed;
inset:0;
display:none;
z-index:10000;
}

#scare img{
width:100%;
height:100%;
object-fit:cover;
}

</style>

</head>

<body>

<div class="bg"></div>

<div class="wrap">

<h1>EVERDUSK</h1>

<button onclick="startTransfer('https://discord.gg/A3GGsc9RM')">DISCORD</button>
<button onclick="startTransfer('https://vexsound.base44.app/')">VEXSOUND</button>
<button onclick="startTransfer('https://play.everdusk.xyz/wasm.html')">ENTER VOID</button>

</div>

<div class="cutscene" id="cutscene">
<div id="count">5</div>
</div>

<div id="scare"></div>

<script>

/* ALWAYS SAFE INIT */
window.startTransfer = function(url){

const cutscene = document.getElementById("cutscene");
const countEl = document.getElementById("count");
const scare = document.getElementById("scare");

let count = 5;

cutscene.classList.add("active");

const images = [
"https://cdn.corenexis.com/files/c/1164486720.webp",
"https://cdn.corenexis.com/files/c/9536946720.jpg",
"https://cdn.corenexis.com/files/c/2912219720.webp"
];

const timer = setInterval(()=>{

countEl.innerText = count;
count--;

if(count < 0){

clearInterval(timer);

/* jumpscare */
const img = images[Math.floor(Math.random()*images.length)];

scare.innerHTML = `<img src="${img}">`;
scare.style.display = "block";

/* open link AFTER scare */
setTimeout(()=>{

scare.style.display = "none";
window.open(url,"_blank");

cutscene.classList.remove("active");
countEl.innerText = "5";

},1200);

}

},1000);

};

</script>

</body>
</html>
