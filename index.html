<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EVERDUSK</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">

<style>

/* ========================= */
/* BASE (UNCHANGED CORE STYLE) */
/* ========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:black;
    overflow:hidden;
    color:white;
    font-family:'Orbitron',sans-serif;
}

/* BACKGROUND */
.bg{
    position:fixed;
    inset:0;
    background:
    radial-gradient(circle at center, rgba(255,0,0,.18), transparent 60%),
    linear-gradient(to bottom, #050505, #000);
    z-index:-10;
}

.fog{
    position:fixed;
    inset:0;
    background:url('https://images.unsplash.com/photo-1511497584788-876760111969?q=80&w=2070&auto=format&fit=crop');
    background-size:cover;
    opacity:.06;
    animation:fogMove 50s linear infinite;
    filter:blur(5px);
}

@keyframes fogMove{
0%{transform:scale(1.1) translateX(0);}
50%{transform:scale(1.2) translateX(-60px);}
100%{transform:scale(1.1) translateX(0);}
}

.scanlines{
position:fixed;
inset:0;
background:repeating-linear-gradient(
to bottom,
rgba(255,255,255,.02),
transparent 2px
);
pointer-events:none;
z-index:999;
}

.glitch{
position:fixed;
inset:0;
background:red;
opacity:0;
mix-blend-mode:screen;
pointer-events:none;
z-index:999999;
}

/* ========================= */
/* MAIN UI */
/* ========================= */

.main{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}

.title{
font-size:120px;
text-shadow:0 0 40px red;
}

.btn{
padding:16px 30px;
margin:10px;
background:rgba(255,0,0,.1);
border:1px solid red;
color:white;
cursor:pointer;
}

/* ========================= */
/* CUTSCENE (FIXED) */
/* ========================= */

.cutscene{
position:fixed;
inset:0;
background:black;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:999999;
}

.cutscene.active{
display:flex;
}

.countdown{
font-size:160px;
}

/* ========================= */
/* MUSIC */
/* ========================= */

.music{
position:fixed;
bottom:20px;
right:20px;
z-index:999999;
}

.music button{
padding:10px 14px;
background:red;
border:none;
color:white;
cursor:pointer;
}

/* ========================= */
/* CONSOLE (SAFE) */
/* ========================= */

#console{
position:fixed;
left:20px;
bottom:20px;
font-size:12px;
color:#ff3b3b;
opacity:.8;
pointer-events:none;
}

</style>

</head>

<body>

<div class="bg"></div>
<div class="fog"></div>
<div class="scanlines"></div>
<div class="glitch"></div>

<!-- MAIN -->
<div class="main">

<div>
<h1 class="title">EVERDUSK</h1>

<button class="btn" onclick="startTransfer('https://play.everdusk.xyz/wasm.html')">
ENTER VOID
</button>

<button class="btn" onclick="startTransfer('https://www.youtube.com/@Everduskofficial')">
YOUTUBE
</button>

<button class="btn" onclick="startTransfer('https://discord.gg/5Xdkuq7h9h')">
DISCORD
</button>

</div>

</div>

<!-- CUTSCENE -->
<div class="cutscene" id="cutscene">
<div class="countdown" id="countdown">5</div>
</div>

<!-- MUSIC -->
<div class="music">
<button onclick="toggleMusic()">MUSIC</button>
<audio id="music" loop>
<source src="https://files.catbox.moe/9l6q0q.mp3">
</audio>
</div>

<script>

/* ========================= */
/* GLITCH */
/* ========================= */

setInterval(()=>{
document.querySelector(".glitch").style.opacity="0.05";
setTimeout(()=>document.querySelector(".glitch").style.opacity="0",100);
},4000);

/* ========================= */
/* MUSIC FIXED */
/* ========================= */

const music = document.getElementById("music");

function toggleMusic(){
if(music.paused){
music.play();
}else{
music.pause();
}
}

/* ========================= */
/* CUTSCENE SYSTEM (FIXED) */
/* ========================= */

const cutscene = document.getElementById("cutscene");
const countdownEl = document.getElementById("countdown");

function startTransfer(url){

cutscene.classList.add("active");

let count = 5;
countdownEl.innerText = count;

const interval = setInterval(()=>{

count--;
countdownEl.innerText = count;

if(count <= 0){
clearInterval(interval);

setTimeout(()=>{
window.location.href = url;
},600);

}

},1000);

}

/* ========================= */
/* FULLSCREEN SAFE */
/* ========================= */

function toggleFullscreen(){
if(!document.fullscreenElement){
document.documentElement.requestFullscreen();
}else{
document.exitFullscreen();
}
}

</script>

</body>
</html>
