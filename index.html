<!-- ====================================== -->
<!-- ADD THIS CSS -->
<!-- ====================================== -->

<style>

/* ====================================== */
/* INTRO LOGO */
/* ====================================== */

.intro-logo{

  width:160px;

  margin-bottom:25px;

  filter:
  drop-shadow(0 0 30px red);

  animation:logoPulse 4s infinite;
}

@keyframes logoPulse{

  0%,100%{
    transform:scale(1);
  }

  50%{
    transform:scale(1.05);
  }
}

/* ====================================== */
/* INTRO TERMINAL */
/* ====================================== */

.intro-terminal{

  width:90%;

  max-width:700px;

  margin-top:40px;

  background:
  rgba(0,0,0,.72);

  border:
  1px solid rgba(255,0,0,.25);

  border-radius:22px;

  overflow:hidden;

  backdrop-filter:blur(12px);

  box-shadow:
  0 0 40px rgba(255,0,0,.2);
}

/* ====================================== */
/* TOP */
/* ====================================== */

.intro-terminal-top{

  padding:18px 25px;

  background:
  rgba(255,0,0,.08);

  border-bottom:
  1px solid rgba(255,0,0,.15);

  color:#ff3b3b;

  letter-spacing:3px;

  font-size:.95rem;
}

/* ====================================== */
/* BODY */
/* ====================================== */

.intro-terminal-body{

  height:220px;

  overflow-y:auto;

  padding:25px;

  color:#00ff88;

  font-family:monospace;

  line-height:2;

  text-align:left;
}

/* ====================================== */
/* INPUT */
/* ====================================== */

.terminal-input-wrap{

  display:flex;

  align-items:center;

  gap:14px;

  padding:20px;

  border-top:
  1px solid rgba(255,0,0,.12);
}

.terminal-input-wrap span{

  color:#ff3b3b;

  font-family:monospace;

  font-size:1rem;
}

#accessCode{

  flex:1;

  background:black;

  border:
  1px solid rgba(255,0,0,.2);

  border-radius:14px;

  padding:16px;

  color:#00ff88;

  font-family:monospace;

  outline:none;

  font-size:1rem;
}

#accessCode:focus{

  border-color:red;

  box-shadow:
  0 0 20px rgba(255,0,0,.3);
}

/* ====================================== */
/* BUTTON */
/* ====================================== */

#enterBtn{

  width:calc(100% - 40px);

  margin:0 20px 20px;

  padding:18px;

  background:
  linear-gradient(
    to right,
    darkred,
    red
  );

  border:none;

  border-radius:16px;

  color:white;

  font-size:1rem;

  letter-spacing:3px;

  cursor:pointer;

  transition:.35s;
}

#enterBtn:hover{

  transform:translateY(-4px);

  box-shadow:
  0 0 35px rgba(255,0,0,.45);
}

/* ====================================== */
/* ERROR */
/* ====================================== */

#accessError{

  display:none;

  padding-bottom:20px;

  color:#ff2a2a;

  letter-spacing:2px;

  animation:errorFlash .5s infinite alternate;
}

@keyframes errorFlash{

  from{
    opacity:.4;
  }

  to{
    opacity:1;
  }
}

/* ====================================== */
/* MOBILE */
/* ====================================== */

@media(max-width:700px){

  .intro-overlay h1{

    font-size:3rem;
  }

  .intro-terminal-body{

    height:180px;
  }

}

</style>

<!-- ====================================== -->
<!-- REPLACE YOUR OLD INTRO SCRIPT -->
<!-- WITH THIS -->
<!-- ====================================== -->

<script>

/* ====================================== */
/* ACCESS SYSTEM */
/* ====================================== */

const correctCode = "438542";

const enterBtn =
document.getElementById("enterBtn");

const accessInput =
document.getElementById("accessCode");

const accessError =
document.getElementById("accessError");

const introTerminal =
document.getElementById("introTerminal");

/* ====================================== */
/* ENTER BUTTON */
/* ====================================== */

enterBtn.onclick = () => {

  const value =
  accessInput.value.trim();

  if(value === correctCode){

    introTerminal.innerHTML +=
    "<br>> ACCESS GRANTED...<br>> WELCOME TO EVERDUSK...";

    setTimeout(() => {

      document
      .getElementById("intro-cutscene")
      .style.opacity = "0";

      setTimeout(() => {

        document
        .getElementById("intro-cutscene")
        .style.display = "none";

      },1000);

    },1500);

  }

  else{

    accessError.style.display =
    "block";

    introTerminal.innerHTML +=
    "<br>> ACCESS DENIED...";

    accessInput.value = "";

    document.body.style.animation =
    "shake .3s";

    setTimeout(() => {

      document.body.style.animation =
      "";

    },300);

  }

};

/* ====================================== */
/* ENTER KEY */
/* ====================================== */

accessInput.addEventListener(
"keydown",
e => {

  if(e.key === "Enter"){

    enterBtn.click();

  }

});

/* ====================================== */
/* SHAKE */
/* ====================================== */

const style =
document.createElement("style");

style.innerHTML = `

@keyframes shake{

  0%{
    transform:translateX(0);
  }

  25%{
    transform:translateX(-5px);
  }

  50%{
    transform:translateX(5px);
  }

  75%{
    transform:translateX(-5px);
  }

  100%{
    transform:translateX(0);
  }

}

`;

document.head.appendChild(style);

</script>
