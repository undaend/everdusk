<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EVERDUSK</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">

<style>

/* ========================= */
/* BASE */
/* ========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:black;
    overflow:hidden;
    color:white;
    font-family:'Orbitron',sans-serif;
}

/* ========================= */
/* BACKGROUND */
/* ========================= */

.bg{
    position:fixed;
    inset:0;
    background:
    radial-gradient(circle at center, rgba(255,0,0,.18), transparent 60%),
    linear-gradient(to bottom, #050505, #000);
    z-index:-10;
}

.fog{
    position:fixed;
    inset:0;
    background:url('https://images.unsplash.com/photo-1511497584788-876760111969?q=80&w=2070&auto=format&fit=crop');
    background-size:cover;
    opacity:.06;
    filter:blur(5px);
    animation:fogMove 50s linear infinite;
}

@keyframes fogMove{
0%{transform:scale(1.1) translateX(0);}
50%{transform:scale(1.2) translateX(-60px);}
100%{transform:scale(1.1) translateX(0);}
}

.scanlines{
    position:fixed;
    inset:0;
    background:repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,.02),
        rgba(255,255,255,.02) 1px,
        transparent 1px,
        transparent 3px
    );
    pointer-events:none;
}

/* ========================= */
/* TEXT */
/* ========================= */

.title{
    font-size:110px;
    text-align:center;
    margin-top:120px;
    text-shadow:0 0 30px red;
}

.desc{
    text-align:center;
    color:#aaa;
    max-width:700px;
    margin:20px auto;
    line-height:1.6;
}

/* ========================= */
/* BUTTONS */
/* ========================= */

.buttons{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
    margin-top:40px;
}

.btn{
    padding:15px 30px;
    border:1px solid rgba(255,0,0,.3);
    background:rgba(255,0,0,.08);
    color:white;
    cursor:pointer;
    transition:.3s;
}

.btn:hover{
    background:red;
    box-shadow:0 0 20px red;
}

/* ========================= */
/* MUSIC */
/* ========================= */

.music-player{
    position:fixed;
    bottom:20px;
    right:20px;
    display:flex;
    gap:10px;
    align-items:center;
    z-index:99999;
}

#musicToggle{
    padding:10px 15px;
    background:black;
    border:1px solid red;
    color:white;
    cursor:pointer;
}

/* ========================= */
/* CUTSCENE */
/* ========================= */

.cutscene{
    position:fixed;
    inset:0;
    background:black;
    display:none;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    z-index:999999;
}

.cutscene.active{
    display:flex;
}

.countdown{
    font-size:200px;
    color:white;
    text-shadow:0 0 40px red;
}

.text{
    margin-top:20px;
    color:#aaa;
}

</style>

</head>

<body>

<div class="bg"></div>
<div class="fog"></div>
<div class="scanlines"></div>

<h1 class="title">EVERDUSK</h1>

<p class="desc">
WARNING: SIGNAL INSTABILITY DETECTED. CLICK ANY BUTTON TO BEGIN TRANSFER.
</p>

<div class="buttons">

<button class="btn" onclick="startTransfer('https://play.everdusk.xyz/wasm.html')">ENTER VOID</button>
<button class="btn" onclick="startTransfer('https://youtube.com')">YOUTUBE</button>
<button class="btn" onclick="startTransfer('https://discord.com')">DISCORD</button>
<button class="btn" onclick="startTransfer('https://vexsound.base44.app/')">VEXSOUND</button>

</div>

<!-- MUSIC -->

<div class="music-player">
<button id="musicToggle" onclick="toggleMusic()">PLAY MUSIC</button>
</div>

<audio id="bgMusic" loop>
<source src="https://cdn.pixabay.com/download/audio/2023/06/29/audio_c9b29860a0.mp3?filename=lofi-study-112191.mp3">
</audio>

<!-- CUTSCENE -->

<div class="cutscene" id="cutscene">

<div class="countdown" id="countdown">5</div>
<div class="text" id="cutText">Preparing transfer...</div>

</div>

<script>

/* ========================= */
/* MUSIC FIX */
/* ========================= */

const music = document.getElementById("bgMusic");
const musicToggle = document.getElementById("musicToggle");

music.volume = 0.3;

document.body.addEventListener("click", () => {
    music.play().catch(()=>{});
}, { once:true });

function toggleMusic(){
    if(music.paused){
        music.play();
        musicToggle.innerText = "PAUSE MUSIC";
    } else {
        music.pause();
        musicToggle.innerText = "PLAY MUSIC";
    }
}

/* ========================= */
/* CUTSCENE SYSTEM */
/* ========================= */

const cutscene = document.getElementById("cutscene");
const countdownEl = document.getElementById("countdown");
const cutText = document.getElementById("cutText");

let targetURL = "";

function startTransfer(url){

    targetURL = url;

    cutscene.classList.add("active");

    let count = 5;
    countdownEl.innerText = count;

    speak(count);

    const interval = setInterval(() => {

        count--;

        if(count > 0){
            countdownEl.innerText = count;
            speak(count);
        }

        if(count <= 0){
            clearInterval(interval);

            countdownEl.innerText = "0";
            cutText.innerText = "TRANSFER COMPLETE";

            speak("transfer complete");

            setTimeout(() => {

                cutscene.classList.remove("active");

                window.location.href = targetURL;

            }, 1200);
        }

    }, 1000);
}

/* ========================= */
/* VOICE */
/* ========================= */

function speak(text){
    const msg = new SpeechSynthesisUtterance(text.toString());
    msg.rate = 0.9;
    msg.pitch = 0.7;
    speechSynthesis.speak(msg);
}

</script>

</body>
</html>
