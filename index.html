<!-- ========================================================= -->
<!-- MASSIVE EVERDUSK EXPANSION -->
<!-- ========================================================= -->

<!-- LIGHTNING -->

<div class="lightning" id="lightning"></div>

<!-- BLOOD OVERLAY -->

<div class="bloodOverlay" id="bloodOverlay"></div>

<!-- WEATHER STATUS -->

<div class="weatherStatus" id="weatherStatus">
  WEATHER: BLOOD STORM
</div>

<!-- CORRUPTION -->

<div class="corruptionUI">

  <div class="corruptionTitle">
    GLOBAL CORRUPTION
  </div>

  <div class="corruptionBar">

    <div class="corruptionFill"
    id="corruptionFill"></div>

  </div>

  <div class="corruptionText"
  id="corruptionText">

    72%

  </div>

</div>

<!-- ACHIEVEMENT -->

<div class="achievement"
id="achievement">

  <h3>NEW ACHIEVEMENT</h3>

  <p>
    “THE WATCHER SEES YOU”
  </p>

</div>

<!-- EMERGENCY ALERT -->

<div class="emergency"
id="emergency">

  ⚠ EMERGENCY LOCKDOWN ACTIVE ⚠

</div>

<!-- ENTITY FLASH -->

<div class="entityFlash"
id="entityFlash">

  <img src="https://i.imgur.com/jxWqIBf.png">

</div>

<!-- PARTICLES -->

<div class="particles"
id="particles"></div>

<!-- AUDIO -->

<audio id="rainAudio"
loop autoplay>

  <source
  src="https://assets.mixkit.co/active_storage/sfx/2515/2515-preview.mp3">

</audio>

<audio id="thunderAudio">

  <source
  src="https://assets.mixkit.co/active_storage/sfx/1244/1244-preview.mp3">

</audio>

<!-- ========================================================= -->
<!-- CSS -->
<!-- ========================================================= -->

<style>

/* =========================================================
LIGHTNING
========================================================= */

.lightning{

  position:fixed;
  inset:0;

  background:white;

  opacity:0;

  pointer-events:none;

  z-index:999999;

}

.lightning.flash{
  animation:lightningFlash .5s;
}

@keyframes lightningFlash{

  0%{opacity:0;}
  20%{opacity:.9;}
  100%{opacity:0;}

}

/* =========================================================
SCREEN SHAKE
========================================================= */

body.shake{
  animation:shake .4s;
}

@keyframes shake{

  0%{transform:translate(0);}
  20%{transform:translate(-5px,3px);}
  40%{transform:translate(5px,-3px);}
  60%{transform:translate(-3px,2px);}
  80%{transform:translate(3px,-2px);}
  100%{transform:translate(0);}

}

/* =========================================================
WEATHER
========================================================= */

.weatherStatus{

  position:fixed;

  bottom:30px;
  left:50%;

  transform:translateX(-50%);

  padding:14px 30px;

  background:
  rgba(0,0,0,.55);

  border:
  1px solid rgba(255,0,0,.25);

  border-radius:20px;

  color:#ff4b4b;

  letter-spacing:3px;

  z-index:99999;

  backdrop-filter:blur(10px);

}

/* =========================================================
CORRUPTION
========================================================= */

.corruptionUI{

  position:fixed;

  top:150px;
  left:20px;

  width:300px;

  background:
  rgba(0,0,0,.55);

  border:
  1px solid rgba(255,0,0,.2);

  border-radius:18px;

  padding:20px;

  z-index:9999;

  backdrop-filter:blur(12px);

}

.corruptionTitle{

  color:#ff3b3b;

  margin-bottom:14px;

  letter-spacing:3px;

}

.corruptionBar{

  width:100%;
  height:16px;

  background:#111;

  border-radius:30px;

  overflow:hidden;

}

.corruptionFill{

  width:72%;
  height:100%;

  background:
  linear-gradient(
    to right,
    darkred,
    red
  );

  transition:1s;

}

.corruptionText{

  margin-top:12px;

  color:#ccc;

}

/* =========================================================
ACHIEVEMENT
========================================================= */

.achievement{

  position:fixed;

  bottom:-200px;
  left:50%;

  transform:translateX(-50%);

  width:340px;

  padding:25px;

  background:
  rgba(0,0,0,.82);

  border:
  1px solid rgba(255,0,0,.25);

  border-radius:20px;

  text-align:center;

  z-index:999999;

  transition:.8s;

}

.achievement.show{
  bottom:30px;
}

.achievement h3{

  color:#ff3b3b;

  margin-bottom:10px;

}

/* =========================================================
EMERGENCY
========================================================= */

.emergency{

  position:fixed;

  top:-120px;
  left:50%;

  transform:translateX(-50%);

  padding:18px 40px;

  background:red;

  color:white;

  font-weight:900;

  letter-spacing:4px;

  z-index:999999;

  transition:.8s;

}

.emergency.show{
  top:120px;
}

/* =========================================================
ENTITY FLASH
========================================================= */

.entityFlash{

  position:fixed;
  inset:0;

  background:black;

  display:flex;
  justify-content:center;
  align-items:center;

  opacity:0;

  pointer-events:none;

  z-index:99999999;

  transition:.2s;

}

.entityFlash img{

  width:100%;
  height:100%;

  object-fit:cover;

}

/* =========================================================
PARTICLES
========================================================= */

.particles{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:-1;
}

.particle{

  position:absolute;

  width:3px;
  height:3px;

  border-radius:50%;

  background:red;

  opacity:.5;

  animation:floatParticle linear infinite;

}

@keyframes floatParticle{

  from{
    transform:translateY(100vh);
  }

  to{
    transform:translateY(-20vh);
  }

}

/* =========================================================
BLOOD OVERLAY
========================================================= */

.bloodOverlay{

  position:fixed;
  inset:0;

  background:
  radial-gradient(circle,
  transparent 40%,
  rgba(120,0,0,.2));

  pointer-events:none;

  z-index:999;

  mix-blend-mode:screen;

}

</style>

<!-- ========================================================= -->
<!-- SCRIPT -->
<!-- ========================================================= -->

<script>

/* =========================================================
LIGHTNING
========================================================= */

setInterval(()=>{

  const lightning =
  document.getElementById("lightning");

  lightning.classList.add("flash");

  document.body.classList.add("shake");

  document
  .getElementById("thunderAudio")
  .play();

  setTimeout(()=>{

    lightning.classList.remove("flash");

    document.body.classList.remove("shake");

  },500);

},25000);

/* =========================================================
WEATHER
========================================================= */

const weatherStates = [

  "WEATHER: BLOOD STORM",
  "WEATHER: RED FOG",
  "WEATHER: THUNDER EVENT",
  "WEATHER: ENTITY RAIN",
  "WEATHER: SIGNAL DISTORTION"

];

setInterval(()=>{

  document
  .getElementById("weatherStatus")
  .innerHTML =

  weatherStates[
    Math.floor(
      Math.random()*weatherStates.length
    )
  ];

},12000);

/* =========================================================
CORRUPTION
========================================================= */

let corruption = 72;

setInterval(()=>{

  corruption +=
  Math.floor(Math.random()*5)-2;

  if(corruption < 40)
    corruption = 40;

  if(corruption > 100)
    corruption = 100;

  document
  .getElementById("corruptionFill")
  .style.width = corruption+"%";

  document
  .getElementById("corruptionText")
  .innerHTML = corruption+"%";

},6000);

/* =========================================================
ACHIEVEMENTS
========================================================= */

setTimeout(()=>{

  const achievement =
  document.getElementById("achievement");

  achievement.classList.add("show");

  setTimeout(()=>{

    achievement.classList.remove("show");

  },5000);

},18000);

/* =========================================================
EMERGENCY ALERT
========================================================= */

setInterval(()=>{

  const emergency =
  document.getElementById("emergency");

  emergency.classList.add("show");

  setTimeout(()=>{

    emergency.classList.remove("show");

  },5000);

},45000);

/* =========================================================
ENTITY FLASH
========================================================= */

setInterval(()=>{

  const entity =
  document.getElementById("entityFlash");

  entity.style.opacity = "1";

  setTimeout(()=>{

    entity.style.opacity = "0";

  },150);

},60000);

/* =========================================================
PARTICLES
========================================================= */

const particles =
document.getElementById("particles");

for(let i=0;i<120;i++){

  const p =
  document.createElement("div");

  p.classList.add("particle");

  p.style.left =
  Math.random()*100+"vw";

  p.style.animationDuration =
  (Math.random()*20+10)+"s";

  p.style.opacity =
  Math.random();

  particles.appendChild(p);

}

/* =========================================================
RANDOM GLITCHES
========================================================= */

setInterval(()=>{

  document.body.style.filter =
  "contrast(1.3) brightness(.9)";

  setTimeout(()=>{

    document.body.style.filter =
    "";

  },150);

},18000);

/* =========================================================
SECRET ARG
========================================================= */

let keys = [];

document.addEventListener("keydown",e=>{

  keys.push(e.key);

  if(keys.join("").includes("watcher")){

    alert(
      "ARCHIVE UNLOCKED: THE WATCHER IS LISTENING"
    );

    keys = [];

  }

});

</script>
