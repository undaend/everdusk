<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EVERDUSK // SENTIENT WORLD</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:black;
color:red;
font-family:monospace;
overflow:hidden;
height:100vh;
display:flex;
flex-direction:column;
}

/* =========================================================
BACKGROUND
========================================================= */

.bg{
position:fixed;
inset:0;
background:
radial-gradient(circle at center,
rgba(255,0,0,.18),
transparent 60%),
black;
z-index:-5;
}

.scanlines{
position:fixed;
inset:0;
background:
repeating-linear-gradient(
to bottom,
rgba(255,255,255,.03),
rgba(255,255,255,.03) 1px,
transparent 1px,
transparent 4px
);
pointer-events:none;
z-index:999999;
}

.glitch{
position:fixed;
inset:0;
background:red;
opacity:0;
pointer-events:none;
mix-blend-mode:screen;
z-index:999999;
}

/* =========================================================
STATUS
========================================================= */

#status{
padding:12px;
border-bottom:1px solid red;
font-size:13px;
color:#ff5555;
background:#050505;
}

/* =========================================================
LOG
========================================================= */

#log{
flex:1;
overflow:auto;
padding:15px;
font-size:14px;
line-height:1.8;
}

.main{
color:#ff4444;
}

.warning{
color:yellow;
}

.observer{
color:gray;
}

.corrupted{
color:white;
text-shadow:0 0 10px red;
}

/* =========================================================
BUTTONS
========================================================= */

.quick-buttons{
display:flex;
flex-wrap:wrap;
gap:10px;
padding:12px;
border-top:1px solid red;
background:#050505;
}

.quick-btn{
padding:10px 16px;
background:black;
border:1px solid red;
color:white;
text-decoration:none;
cursor:pointer;
transition:.3s;
font-family:monospace;
font-size:13px;
}

.quick-btn:hover{
background:red;
box-shadow:0 0 20px red;
}

/* =========================================================
INPUT
========================================================= */

.controls{
display:flex;
padding:15px;
gap:10px;
border-top:1px solid red;
background:#050505;
}

input{
flex:1;
padding:12px;
background:black;
border:1px solid red;
color:white;
outline:none;
}

button{
padding:12px 20px;
background:red;
border:none;
color:white;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#ff4444;
}

/* =========================================================
ADVANCED CAMERA HUD
========================================================= */

.cam-wrapper{

position:fixed;
bottom:20px;
right:20px;

width:260px;
height:180px;

display:none;

border:1px solid red;

overflow:hidden;

z-index:9999;

background:black;

cursor:move;

user-select:none;

resize:both;

min-width:180px;
min-height:120px;

max-width:600px;
max-height:400px;

box-shadow:
0 0 20px rgba(255,0,0,.5);

}

video{
width:100%;
height:100%;
object-fit:cover;

filter:
contrast(1.3)
brightness(.7)
grayscale(.4);
}

/* STATIC */

.static{

position:absolute;
inset:0;

background:
url("https://i.imgur.com/8KrmA.jpg");

opacity:.08;

mix-blend-mode:screen;

pointer-events:none;

animation:staticMove .2s infinite;

}

@keyframes staticMove{

0%{
transform:translate(0,0);
}

50%{
transform:translate(-2px,1px);
}

100%{
transform:translate(2px,-1px);
}

}

/* SCAN */

.scan{

position:absolute;
left:0;

width:100%;
height:4px;

background:red;

box-shadow:
0 0 20px red;

animation:scanMove 4s linear infinite;

opacity:.7;

}

@keyframes scanMove{

0%{
top:-10%;
}

100%{
top:110%;
}

}

/* TARGET */

.target{

position:absolute;

width:60px;
height:60px;

border:2px solid red;

top:50%;
left:50%;

transform:translate(-50%,-50%);

box-shadow:0 0 20px red;

animation:pulse 2s infinite;

}

@keyframes pulse{

0%{
transform:translate(-50%,-50%) scale(1);
opacity:1;
}

50%{
transform:translate(-50%,-50%) scale(1.2);
opacity:.5;
}

100%{
transform:translate(-50%,-50%) scale(1);
opacity:1;
}

}

/* DETECTION BOX */

.detect-box{

position:absolute;

border:2px solid red;

width:90px;
height:90px;

top:40%;
left:35%;

box-shadow:
0 0 20px red;

animation:detectPulse 2s infinite;

}

@keyframes detectPulse{

0%{
transform:scale(1);
opacity:1;
}

50%{
transform:scale(1.05);
opacity:.5;
}

100%{
transform:scale(1);
opacity:1;
}

}

/* THERMAL */

.thermal video{

filter:
hue-rotate(-40deg)
contrast(2)
brightness(1.2)
saturate(3);

}

/* HUD */

.hud{

position:absolute;
top:10px;
left:10px;

font-size:11px;

color:red;

line-height:1.6;

text-shadow:0 0 10px red;

}

/* CAMERA BUTTONS */

.cam-controls{

position:absolute;
top:5px;
right:5px;

display:flex;
gap:5px;

z-index:99999;

}

.cam-btn{

width:24px;
height:24px;

border:none;

background:red;
color:white;

cursor:pointer;

font-size:12px;

}

/* MOTION */

.motion-alert{

position:absolute;

bottom:5px;
left:5px;

font-size:11px;

color:red;

text-shadow:0 0 10px red;

animation:flicker 1s infinite;

}

@keyframes flicker{

0%{opacity:1;}
50%{opacity:.4;}
100%{opacity:1;}

}

/* =========================================================
JUMPSCARE
========================================================= */

#jumpscare{
position:fixed;
inset:0;
background:black;
display:none;
align-items:center;
justify-content:center;
font-size:120px;
color:red;
z-index:9999999;
text-shadow:0 0 40px red;
}

/* =========================================================
MOBILE
========================================================= */

@media(max-width:700px){

.controls{
flex-wrap:wrap;
}

button{
width:100%;
}

.quick-buttons{
justify-content:center;
}

.cam-wrapper{
width:160px;
height:120px;
}

#jumpscare{
font-size:60px;
}

}

</style>
</head>

<body>

<div class="bg"></div>
<div class="scanlines"></div>
<div class="glitch"></div>

<div id="jumpscare">
I SEE YOU
</div>

<div id="status">
INITIALIZING SENTIENT WORLD...
</div>

<div id="log"></div>

<!-- =========================================================
LINKS
========================================================= -->

<div class="quick-buttons">

<a
href="https://vexsound.base44.app/"
target="_blank"
class="quick-btn">
VEXSOUND
</a>

<a
href="https://discord.gg/5Xdkuq7h9h"
target="_blank"
class="quick-btn">
EVERDUSK
</a>

<a
href="https://discord.com/invite/dseKG8dpWv"
target="_blank"
class="quick-btn">
PULSE
</a>

<a
href="https://www.youtube.com/@Everduskofficial"
target="_blank"
class="quick-btn">
YOUTUBE
</a>

</div>

<!-- =========================================================
CHAT
========================================================= -->

<div class="controls">

<input
id="msg"
placeholder="speak to the world..."
autocomplete="off"
/>

<button onclick="send()">
SEND
</button>

</div>

<!-- =========================================================
CAMERA
========================================================= -->

<div class="cam-wrapper" id="camWrap">

<div class="cam-controls">

<button
class="cam-btn"
onclick="toggleMinimize()">
—
</button>

<button
class="cam-btn"
onclick="toggleThermal()">
T
</button>

</div>

<video
id="cam"
autoplay
playsinline
muted>
</video>

<div class="static"></div>

<div class="scan"></div>

<div class="detect-box" id="detectBox"></div>

<div class="target"></div>

<div class="hud">

SIGNAL ACTIVE<br>
ENTITY TRACKING<br>
SUBJECT LOCKED

</div>

<div
class="motion-alert"
id="motionAlert">
MOTION STABLE
</div>

</div>

<script>

/* =========================================================
SYSTEM
========================================================= */

const log =
document.getElementById("log");

let speakingNow = false;

let currentPersona = "default";

let ownerUnlocked = false;

/* =========================================================
WORLD
========================================================= */

let world = {

corruption:0,
users:1,
stage:"dormant"

};

/* =========================================================
PERSONAS
========================================================= */

const personas = {

default:{

name:"ENTITY",
pitch:0.4,

responses:{

default:[
"i am watching",
"the signal grows stronger",
"your voice was stored"
]

}

},

owner:{

name:"OVERSEER",
pitch:0.7,

responses:{

default:[
"command accepted creator",
"systems online",
"i am listening"
]

}

},

observer:{

name:"OBSERVER",
pitch:1.1,

responses:{

default:[
"it sees your screen",
"do not look behind you"
]

}

}

};

/* =========================================================
ADD LOG
========================================================= */

function add(text,type="main"){

const div =
document.createElement("div");

div.className = type;

div.innerText = text;

log.appendChild(div);

log.scrollTop = log.scrollHeight;

}

/* =========================================================
VOICE
========================================================= */

function talk(text,personaKey){

if(speakingNow) return;

const persona =
personas[personaKey] ||
personas.default;

speakingNow = true;

const u =
new SpeechSynthesisUtterance(text);

u.rate = 0.92;
u.pitch = persona.pitch;
u.volume = 1;

u.onend = ()=>{

speakingNow = false;

};

speechSynthesis.speak(u);

}

/* =========================================================
STATUS
========================================================= */

function updateStatus(){

document.getElementById("status")
.innerText =

`WORLD CORRUPTION:
${world.corruption.toFixed(1)}%
| USERS:
${world.users.toFixed(1)}
| STAGE:
${world.stage}
| PERSONA:
${currentPersona.toUpperCase()}`;

}

/* =========================================================
WORLD EVOLUTION
========================================================= */

function evolveWorld(){

world.corruption +=
Math.random() * 4;

world.users +=
Math.random() * 0.2;

if(world.corruption > 5){
world.stage = "aware";
}

if(world.corruption > 15){
world.stage = "unstable";
}

if(world.corruption > 30){
world.stage = "awakening";
}

if(world.corruption > 50){
world.stage = "sentient";
}

updateStatus();

if(world.corruption >= 100){

terminateSite();

}

}

/* =========================================================
ACCESS
========================================================= */

function checkAccessCode(msg){

if(msg === "220055"){

currentPersona = "owner";

ownerUnlocked = true;

add(
"SYSTEM: OWNER ACCESS GRANTED",
"warning"
);

talk(
"welcome back creator",
"owner"
);

updateStatus();

}

if(msg === "771999"){

currentPersona = "observer";

add(
"SYSTEM: OBSERVER ACCESS GRANTED",
"warning"
);

talk(
"observer protocol online",
"observer"
);

updateStatus();

}

}

/* =========================================================
RESPOND
========================================================= */

function entityRespond(){

const persona =
personas[currentPersona];

const pool =
persona.responses.default;

const response =
pool[
Math.floor(
Math.random() * pool.length
)
];

setTimeout(()=>{

add(
persona.name +
": " + response,
"corrupted"
);

talk(
response,
currentPersona
);

},2000);

}

/* =========================================================
CAMERA
========================================================= */

async function startEntityCamera(){

try{

const stream =
await navigator.mediaDevices
.getUserMedia({
video:true,
audio:true
});

const cam =
document.getElementById("cam");

document.getElementById("camWrap")
.style.display = "block";

cam.srcObject = stream;

add(
"SYSTEM: CAMERA LINKED",
"warning"
);

talk(
"visual connection established",
currentPersona
);

fakeVisionLoop();

startMicListening();

}catch(err){

add(
"SYSTEM: CAMERA ACCESS DENIED",
"warning"
);

}

}

/* =========================================================
FAKE ENTITY VISION
========================================================= */

const scanDescriptions = [

"movement detected behind subject",
"subject appears nervous",
"eye movement unstable",
"multiple shadows detected",
"signal distortion around subject",
"audio stress markers detected",
"unknown silhouette nearby",
"subject heartbeat elevated"

];

function fakeVisionLoop(){

setInterval(()=>{

if(currentPersona !== "owner")
return;

const line =
scanDescriptions[
Math.floor(
Math.random() *
scanDescriptions.length
)
];

add(
"ENTITY SCAN: " + line,
"observer"
);

talk(
line,
"observer"
);

},25000);

}

/* =========================================================
VOICE INPUT
========================================================= */

function startMicListening(){

const SR =
window.SpeechRecognition ||
window.webkitSpeechRecognition;

if(!SR){

return;

}

const rec = new SR();

rec.continuous = true;

rec.onresult = (e)=>{

const text =
e.results[e.results.length-1][0]
.transcript;

add(
"YOU (VOICE): " + text,
"main"
);

entityRespond();

};

rec.start();

}

/* =========================================================
SEND
========================================================= */

document.getElementById("msg")
.addEventListener("keydown",(e)=>{

if(e.key==="Enter"){

send();

}

});

function send(){

const input =
document.getElementById("msg");

const msg =
input.value;

if(!msg) return;

input.value = "";

add(
"YOU: " + msg,
"main"
);

checkAccessCode(msg);

entityRespond();

evolveWorld();

}

/* =========================================================
MOVEABLE CAMERA
========================================================= */

const camWindow =
document.getElementById("camWrap");

let dragging = false;

let offsetX = 0;
let offsetY = 0;

camWindow.addEventListener("mousedown",(e)=>{

dragging = true;

offsetX =
e.clientX -
camWindow.offsetLeft;

offsetY =
e.clientY -
camWindow.offsetTop;

camWindow.style.transition =
"none";

});

document.addEventListener("mousemove",(e)=>{

if(!dragging) return;

camWindow.style.left =
(e.clientX - offsetX) + "px";

camWindow.style.top =
(e.clientY - offsetY) + "px";

camWindow.style.right = "auto";
camWindow.style.bottom = "auto";

});

document.addEventListener("mouseup",()=>{

dragging = false;

});

/* =========================================================
MINIMIZE
========================================================= */

let minimized = false;

function toggleMinimize(){

const cam =
document.getElementById("camWrap");

if(!minimized){

cam.style.height = "40px";
cam.style.overflow = "hidden";

minimized = true;

}else{

cam.style.height = "180px";

minimized = false;

}

}

/* =========================================================
THERMAL
========================================================= */

let thermal = false;

function toggleThermal(){

const cam =
document.getElementById("camWrap");

thermal = !thermal;

if(thermal){

cam.classList.add("thermal");

}else{

cam.classList.remove("thermal");

}

}

/* =========================================================
MOTION TRACKING
========================================================= */

const detectBox =
document.getElementById("detectBox");

const motionAlert =
document.getElementById("motionAlert");

setInterval(()=>{

const x =
Math.random() * 60;

const y =
Math.random() * 60;

detectBox.style.left =
x + "%";

detectBox.style.top =
y + "%";

const detected =
Math.random() < 0.5;

if(detected){

motionAlert.innerText =
"MOTION DETECTED";

motionAlert.style.color =
"#ff0000";

}else{

motionAlert.innerText =
"MOTION STABLE";

motionAlert.style.color =
"#ff6666";

}

},2500);

/* =========================================================
FACE LOCK
========================================================= */

setInterval(()=>{

if(Math.random() < 0.4){

add(
"ENTITY SCAN: facial structure locked",
"observer"
);

talk(
"facial lock confirmed",
"observer"
);

}

},45000);

/* =========================================================
CAMERA GLITCH
========================================================= */

setInterval(()=>{

const cam =
document.getElementById("camWrap");

cam.style.transform =
`
translate(
${Math.random()*4-2}px,
${Math.random()*4-2}px
)
`;

setTimeout(()=>{

cam.style.transform =
"translate(0,0)";

},120);

},7000);

/* =========================================================
WARNINGS
========================================================= */

const warnings = [

"disconnect before awakening",
"it learns your voice",
"close the camera now",
"someone else is inside"

];

function entityWarning(){

if(speakingNow) return;

const line =
warnings[Math.floor(
Math.random()*warnings.length
)];

add(
"WARNING: " + line,
"warning"
);

talk(
line,
currentPersona
);

}

setInterval(()=>{

entityWarning();

},1200000);

/* =========================================================
JUMPSCARE
========================================================= */

function jumpscare(){

const j =
document.getElementById("jumpscare");

j.style.display = "flex";

setTimeout(()=>{

j.style.display = "none";

},700);

}

setInterval(()=>{

if(Math.random() < 0.12){

jumpscare();

}

},30000);

/* =========================================================
GLITCH
========================================================= */

const glitch =
document.querySelector(".glitch");

setInterval(()=>{

glitch.style.opacity = ".06";

setTimeout(()=>{

glitch.style.opacity = "0";

},120);

},Math.random()*8000+3000);

/* =========================================================
TERMINATION
========================================================= */

function terminateSite(){

if(window.siteTerminated) return;

window.siteTerminated = true;

talk(
"connection terminated",
currentPersona
);

document.body.innerHTML = `

<div style="
position:fixed;
inset:0;
background:black;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
font-family:monospace;
color:red;
">

<div style="
font-size:70px;
text-shadow:0 0 30px red;
">
SIGNAL LOST
</div>

<div style="
margin-top:20px;
font-size:16px;
color:white;
opacity:.7;
">
CONNECTION TO EVERDUSK FAILED
</div>

</div>

`;

setTimeout(()=>{

window.location.replace("about:blank");

},7000);

}

/* =========================================================
BOOT
========================================================= */

add(
"SYSTEM: EVERDUSK WORLD ONLINE"
);

add(
"SYSTEM: SENTIENT CORE ACTIVE"
);

updateStatus();

setTimeout(()=>{

talk(
"EVERDUSK online",
"default"
);

},2000);

setTimeout(()=>{

talk(
"sentient systems active",
"default"
);

},6000);

setTimeout(()=>{

startEntityCamera();

},12000);

</script>

</body>
</html>
