<style>

/* ====================================== */
/* WORLD FEED */
/* ====================================== */

.world-feed{

  position:fixed;

  top:140px;
  right:20px;

  width:340px;

  background:
  rgba(0,0,0,.55);

  border:
  1px solid rgba(255,0,0,.2);

  border-radius:18px;

  overflow:hidden;

  z-index:9999;

  backdrop-filter:blur(10px);

  box-shadow:
  0 0 30px rgba(255,0,0,.12);
}

.feed-header{

  padding:14px 18px;

  background:
  rgba(255,0,0,.08);

  border-bottom:
  1px solid rgba(255,0,0,.15);

  color:#ff3b3b;

  letter-spacing:2px;
}

.feed-messages,
.player-messages{

  height:220px;

  overflow-y:auto;

  padding:16px;

  display:flex;
  flex-direction:column;

  gap:12px;

  font-size:.9rem;

  color:#ccc;
}

/* ====================================== */
/* PLAYER FEED */
/* ====================================== */

.player-feed{

  position:fixed;

  top:420px;
  right:20px;

  width:340px;

  background:
  rgba(0,0,0,.55);

  border:
  1px solid rgba(255,0,0,.2);

  border-radius:18px;

  overflow:hidden;

  z-index:9999;

  backdrop-filter:blur(10px);
}

/* ====================================== */
/* CORRUPTION */
/* ====================================== */

.corruption-wrap{

  position:fixed;

  top:100px;
  left:20px;

  width:300px;

  background:
  rgba(0,0,0,.55);

  border:
  1px solid rgba(255,0,0,.15);

  border-radius:16px;

  padding:20px;

  z-index:999;
}

.corruption-title{

  color:#ff3b3b;

  margin-bottom:15px;

  letter-spacing:2px;
}

.corruption-bar{

  height:16px;

  background:#111;

  border-radius:20px;

  overflow:hidden;
}

.corruption-fill{

  width:72%;
  height:100%;

  background:
  linear-gradient(
    to right,
    darkred,
    red
  );

  transition:1s;
}

#corruptionText{

  display:block;

  margin-top:12px;

  color:#ccc;
}

/* ====================================== */
/* ENTITY FLASH */
/* ====================================== */

.entity-flash{

  position:fixed;
  inset:0;

  background:black;

  display:flex;

  justify-content:center;
  align-items:center;

  opacity:0;

  pointer-events:none;

  z-index:999999;

  transition:.2s;
}

.entity-flash img{

  width:100%;
  height:100%;

  object-fit:cover;
}

/* ====================================== */

/* ====================================== */

  position:fixed;

  bottom:-200px;
  left:50%;

  transform:translateX(-50%);

  width:340px;

  background:

  border:
  1px solid rgba(255,0,0,.25);

  border-radius:20px;

  padding:25px;

  text-align:center;

  z-index:999999;

  transition:.7s;
}

.achievement-popup h3{

<script>

/* ====================================== */
/* WORLD EVENTS */
/* ====================================== */

const feed =
document.getElementById("feedMessages");

const worldEvents = [

  "⚠ Entity movement detected near The Watchers",
  "⚠ Pulse Network corruption increased",
  "⚠ Black Hollow signal amplified",
  "⚠ Unknown whispers recorded",
  "⚠ Eclipse storm approaching",
  "⚠ Red fog spreading through Everdusk",
  "⚠ Emergency lockdown initiated"

];

setInterval(() => {

  const item =
  document.createElement("div");

  item.innerHTML =
  worldEvents[
    Math.floor(Math.random()*worldEvents.length)
  ];

  feed.prepend(item);

  if(feed.children.length > 12){

    feed.removeChild(feed.lastChild);

  }

},5000);

/* ====================================== */
/* PLAYER FEED */
/* ====================================== */

const playerFeed =
document.getElementById("playerMessages");

const playerEvents = [

  "ShadowFox joined Everdusk...",
  "VoidWalker entered Black Hollow...",
  "Unknown player disconnected...",
  "Watcher_01 was consumed...",
  "SignalHunter unlocked ARCHIVE-7...",
  "Entity activity increased...",
  "NightCrawler found hidden files..."

];

setInterval(() => {

  const item =
  document.createElement("div");

  item.innerHTML =
  playerEvents[
    Math.floor(Math.random()*playerEvents.length)
  ];

  playerFeed.prepend(item);

  if(playerFeed.children.length > 12){

    playerFeed.removeChild(playerFeed.lastChild);

  }

},4000);

/* ====================================== */
/* CORRUPTION */
/* ====================================== */

const corruptionFill =
document.getElementById("corruptionFill");

const corruptionText =
document.getElementById("corruptionText");

let corruption = 72;

setInterval(() => {

  corruption +=
  Math.floor(Math.random()*6)-2;

  if(corruption < 40)
    corruption = 40;

  if(corruption > 100)
    corruption = 100;

  corruptionFill.style.width =
  corruption + "%";

  corruptionText.innerHTML =
  corruption + "%";

},6000);

/* ====================================== */
/* ENTITY FLASH */
/* ====================================== */

setInterval(() => {

  const flash =
  document.getElementById("entityFlash");

  flash.style.opacity = "1";

  setTimeout(() => {

    flash.style.opacity = "0";

  },120);

},45000);

/* ====================================== */
/* SECRET ACHIEVEMENT */
/* ====================================== */

document
.getElementById("secretZone")
.onclick = () => {

  const achievement =
  document.getElementById("achievementPopup");

  achievement.style.bottom = "30px";

  setTimeout(() => {

    achievement.style.bottom = "-200px";

  },5000);

};

/* ====================================== */
/* WEATHER SYSTEM */
/* ====================================== */

const weatherText =
document.getElementById("weatherStatus");

const weatherStates = [

  "WEATHER: BLOOD STORM",
  "WEATHER: RED FOG",
  "WEATHER: THUNDER EVENT",
  "WEATHER: ENTITY RAIN",
  "WEATHER: SIGNAL DISTORTION"

];

setInterval(() => {

  weatherText.innerHTML =
  weatherStates[
    Math.floor(Math.random()*weatherStates.length)
  ];

},12000);

/* ====================================== */
/* TERMINAL AUTO SCROLL */
/* ====================================== */

const terminal =
document.getElementById("terminal");

setInterval(() => {

  terminal.scrollTop =
  terminal.scrollHeight;

},500);

</script>
