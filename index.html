<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EVERDUSK</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">

<style>

/* ========================= */
/* BASE */
/* ========================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:black;
overflow:hidden;
color:white;
font-family:'Orbitron',sans-serif;
}

/* ========================= */
/* BACKGROUND */
/* ========================= */

.bg{
position:fixed;
inset:0;
background:
radial-gradient(circle at center, rgba(255,0,0,.18), transparent 60%),
linear-gradient(to bottom, #050505, #000);
z-index:-10;
}

.fog{
position:fixed;
inset:0;
background:url('https://images.unsplash.com/photo-1511497584788-876760111969?q=80&w=2070&auto=format&fit=crop');
background-size:cover;
opacity:.06;
filter:blur(5px);
animation:fogMove 50s linear infinite;
}

@keyframes fogMove{
0%{transform:scale(1.1) translateX(0);}
50%{transform:scale(1.2) translateX(-60px);}
100%{transform:scale(1.1) translateX(0);}
}

.scanlines{
position:fixed;
inset:0;
background:repeating-linear-gradient(
to bottom,
rgba(255,255,255,.02),
transparent 3px
);
pointer-events:none;
z-index:999;
}

/* ========================= */
/* GLITCH */
/* ========================= */

.glitch{
position:fixed;
inset:0;
background:red;
opacity:0;
mix-blend-mode:screen;
pointer-events:none;
z-index:999999;
}

/* ========================= */
/* MAIN UI */
/* ========================= */

.main{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
}

.title{
font-size:110px;
text-shadow:0 0 40px red;
}

.btn{
padding:16px 30px;
margin:10px;
background:rgba(255,0,0,.1);
border:1px solid red;
color:white;
cursor:pointer;
}

/* ========================= */
/* SCAN OVERLAY */
/* ========================= */

#scan{
position:fixed;
inset:0;
display:none;
justify-content:center;
align-items:center;
background:black;
z-index:9999999;
}

#box{
width:520px;
padding:20px;
border:1px solid red;
background:rgba(0,0,0,.95);
box-shadow:0 0 40px red;
font-family:monospace;
}

#bar{
width:100%;
height:10px;
background:#111;
margin:10px 0;
}

#fill{
height:100%;
width:0%;
background:red;
}

.log{
font-size:12px;
color:#ff3b3b;
height:140px;
overflow:hidden;
}

/* ========================= */
/* AI TEXT */
/* ========================= */

#ai{
position:fixed;
top:35%;
left:50%;
transform:translateX(-50%);
font-size:20px;
color:red;
opacity:0;
transition:.3s;
text-shadow:0 0 20px red;
z-index:99999999;
}

</style>

</head>

<body>

<div class="bg"></div>
<div class="fog"></div>
<div class="scanlines"></div>
<div class="glitch"></div>

<div class="main">

<div>
<h1 class="title">EVERDUSK</h1>

<button class="btn" onclick="startScan('https://play.everdusk.xyz/wasm.html')">
ENTER THE VOID
</button>
</div>

</div>

<!-- SCAN UI -->

<div id="scan">

<div id="box">

<div style="color:red;font-size:16px;">EVERDUSK SECURITY SCAN</div>

<div id="status" style="color:#ff4d4d;margin-top:5px;">Initializing...</div>

<div id="bar"><div id="fill"></div></div>

<div class="log" id="log"></div>

</div>

</div>

<!-- AI TEXT -->

<div id="ai"></div>

<script>

/* ========================= */
/* ELEMENTS */
/* ========================= */

const scan = document.getElementById("scan");
const fill = document.getElementById("fill");
const log = document.getElementById("log");
const ai = document.getElementById("ai");
const statusText = document.getElementById("status");

/* ========================= */
/* AI SPEECH */
/* ========================= */

function speak(text){
ai.innerText = text;
ai.style.opacity = 1;

setTimeout(()=>ai.style.opacity = 0,1200);
}

/* ========================= */
/* LOGS */
/* ========================= */

const msgs = [
"system integrity check...",
"scanning memory sectors...",
"unknown signature detected",
"warning: anomaly rising",
"critical instability forming",
"ENTITY DETECTED"
];

function addLog(){
const el = document.createElement("div");
el.innerText = msgs[Math.floor(Math.random()*msgs.length)];
log.appendChild(el);

if(log.children.length > 8){
log.removeChild(log.firstChild);
}
}

/* ========================= */
/* SCAN SYSTEM */
/* ========================= */

function startScan(url){

scan.style.display = "flex";

let p = 0;

speak("Starting system scan");

const interval = setInterval(()=>{

p += Math.random()*10;

fill.style.width = p + "%";

addLog();

if(p > 30) speak("Analyzing system...");
if(p > 60) speak("Suspicious activity detected");
if(p > 85) speak("Warning level critical");

if(p >= 100){

clearInterval(interval);

statusText.innerText = "Scan complete: anomalies found";

speak("Scan finished");

setTimeout(()=>{

scan.style.display = "none";

window.location.href = url;

},1200);

}

},200);

}

</script>

</body>
</html>
